<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Fiat Mobi Drive 1.0 Firefly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains+Mono', 'monospace'],
                    },
                    colors: {
                        brand: { 50: '#f0f7ff', 100: '#e0effe', 200: '#bae0fd', 500: '#0070f3', 600: '#005bc2', 900: '#031b33' },
                        status: { verde: '#10b981', amarelo: '#f59e0b', vermelho: '#ef4444' }
                    },
                    backgroundImage: {
                        'glass-gradient': 'linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05))',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #031b33; background-image: radial-gradient(circle at 0% 0%, rgba(0,112,243,0.15) 0%, transparent 50%), radial-gradient(circle at 100% 100%, rgba(0,112,243,0.1) 0%, transparent 50%); color: #fff; min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.1); border-radius:24px; transition:all .3s ease; }
        .glass-card:hover{ border-color:rgba(0,112,243,0.4); transform: translateY(-2px); box-shadow:0 10px 30px -10px rgba(0,0,0,0.5); }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
        @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.6;} }
        .custom-scrollbar::-webkit-scrollbar{width:6px;} .custom-scrollbar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px;}
    </style>
</head>
<body class="p-4 md:p-8 custom-scrollbar">
    <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div>
            <div class="flex items-center gap-3 mb-2">
                <span class="px-3 py-1 rounded-full bg-brand-500/20 text-brand-500 text-xs font-bold uppercase tracking-widest border border-brand-500/30">Dashboard Veicular</span>
                <span class="flex items-center gap-1.5 text-status-amarelo text-sm font-semibold"><span class="w-2 h-2 rounded-full bg-status-amarelo status-pulse"></span>Status: Atenção</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-2">Fiat Mobi <span class="text-brand-500 italic">Drive 1.0</span></h1>
            <div class="flex items-center gap-4 text-slate-400"><div class="flex items-center gap-2"><span class="font-mono text-lg">109.300 KM</span></div><span class="text-sm">Motor Firefly de 3 Cilindros</span></div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto p-6 bg-white/5 rounded-2xl glass-card mb-8">
        <h2 class="text-xl font-bold text-white mb-4">Registrar Manutenção / Abastecimento</h2>
        <form id="manutencaoForm" class="grid gap-4 md:grid-cols-2 items-end">
            <div><label class="text-sm text-slate-300">Data</label><input id="data" type="date" required class="w-full mt-1 rounded-lg border border-white/20 bg-black/25 p-2 text-white" /></div>
            <div><label class="text-sm text-slate-300">KM</label><input id="km" type="number" required class="w-full mt-1 rounded-lg border border-white/20 bg-black/25 p-2 text-white" /></div>
            <div><label class="text-sm text-slate-300">Valor</label><input id="valor" type="number" step="0.01" required class="w-full mt-1 rounded-lg border border-white/20 bg-black/25 p-2 text-white" /></div>
            <div><label class="text-sm text-slate-300">Tipo de Serviço</label><input id="tipoServico" type="text" required class="w-full mt-1 rounded-lg border border-white/20 bg-black/25 p-2 text-white" placeholder="Abastecimento, Troca de óleo, etc." /></div>
            <div class="md:col-span-2 flex items-center gap-3">
                <button id="enviarBtn" type="button" class="px-6 py-2 rounded-lg bg-brand-500 text-white font-bold hover:bg-brand-600">Enviar</button>
                <span id="loader" class="text-sm text-slate-200" style="display:none">Gravando...</span>
            </div>
        </form>
    </section>

    <main class="max-w-7xl mx-auto space-y-8">
        <!-- Mantém restante do dashboard existente -->
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="glass-card p-6 border-l-4 border-l-brand-500"><p class="text-slate-400 text-xs uppercase tracking-wider">Próxima Revisão</p><p class="text-2xl text-white">119.000 KM</p></div>
            <div class="glass-card p-6"><p class="text-slate-400 text-xs uppercase tracking-wider">Eficiência Média</p><p class="text-2xl text-white">20.0 KM/L</p></div>
            <div class="glass-card p-6"><p class="text-slate-400 text-xs uppercase tracking-wider">Gasto Mensal</p><p class="text-2xl text-white">R$ 220,00</p></div>
            <div class="glass-card p-6"><p class="text-slate-400 text-xs uppercase tracking-wider">Custo por KM</p><p class="text-2xl text-white">--</p></div>
        </section>

        <section class="glass-card p-6"><h3 class="text-white font-bold mb-4">Evolução do Consumo</h3><div class="h-64"><canvas id="fuelChart"></canvas></div></section>
    </main>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyBVogpqibgpeDvSstBRkWDcnFE8Wnwqt5qy_gdN9Aqqu9goZQK5Kqpv7YpNDkOMspmIA/exec";

        async function enviarManutencao() {
            const btn = document.getElementById("enviarBtn");
            const loader = document.getElementById("loader");
            btn.disabled = true;
            loader.style.display = "inline";

            const payload = {
                data: document.getElementById("data").value,
                km: document.getElementById("km").value,
                valor: document.getElementById("valor").value,
                tipoServico: document.getElementById("tipoServico").value
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const result = await response.json();
                if (!result.success) throw new Error(result.message || "Erro no servidor");

                alert("Registro gravado com sucesso!");
                document.getElementById("manutencaoForm").reset();
            } catch (error) {
                console.error("Falha no envio:", error);
                alert("Erro ao enviar dados: " + error.message);
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
            }
        }

        document.getElementById("enviarBtn").addEventListener("click", enviarManutencao);

        const ctx = document.getElementById('fuelChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(0, 112, 243, 0.4)');
        gradient.addColorStop(1, 'rgba(0, 112, 243, 0)');

        const data = {
            labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai'],
            datasets: [{label:'KM/L', data:[17.5, 18.2, 17.8, 19.1, 20.0], fill:true, backgroundColor:gradient, borderColor:'#0070f3', borderWidth:3, tension:0.4}]
        };

        new Chart(ctx, { type:'line', data, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}}});
    </script>
</body>
</html>
